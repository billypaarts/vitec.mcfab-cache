name: Update Vitec Cache

on:
  schedule:
    # Körs varje timme
    - cron: '0 * * * *'
  workflow_dispatch:
    # Kan också köras manuellt

jobs:
  update-cache:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
      
      - name: Run cache updater
        run: php update_cache.php
      
      - name: Check cache files
        run: |
          echo "=== Cache files ==="
          ls -lah cache_*.json || echo "No cache files found"
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add cache_*.json
            git commit -m "Update Vitec cache"
            git push
          fi
